name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  goreleaser:
    runs-on: namespace-profile-foundation-releaser
    permissions:
      contents: write
    env:
      TIGRIS_ASSETS_BUCKET: nsl-public-assets
      TIGRIS_ENDPOINT: https://t3.storage.dev
      AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ASSETS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_ASSETS_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
    steps:
      - uses: actions/checkout@v6

      - name: Validate Tigris configuration
        run: test -n "$TIGRIS_ASSETS_BUCKET"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
          cache: false
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

      - name: Publish release artifacts to Tigris
        run: go run ./tools/release-tigris release --bucket "$TIGRIS_ASSETS_BUCKET" --endpoint "$TIGRIS_ENDPOINT" --dist-dir dist --tag "$GITHUB_REF_NAME"
